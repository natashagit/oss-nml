version: '3.8'

services:
  ai_service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    platform: linux/amd64 # Force Linux build for EC2
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TRELLO_API_KEY=${TRELLO_API_KEY}
      - TRELLO_API_SECRET=${TRELLO_API_SECRET}
      - TRELLO_TOKEN=${TRELLO_TOKEN}
      - TRELLO_BOARD_ID=${TRELLO_BOARD_ID}
      - REDIRECT_URI=${REDIRECT_URI:-http://localhost:8000/callback}
      - TASKS_INTERACTIVE=${TASKS_INTERACTIVE:-false}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_DEFAULT_TOKEN_TYPE=${DISCORD_DEFAULT_TOKEN_TYPE:-Bot}
      - CHAT_CHANNEL_ID=${CHAT_CHANNEL_ID}
    restart: always

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - ai_service

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  grafana-storage:
