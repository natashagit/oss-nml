site_name: AI Client Service
site_description: "A professional-grade AI client service with OAuth 2.0 authentication and component-based architecture."

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - content.code.copy

nav:
  - 'Overview': 'index.md'
  - 'Architecture': 'component.md'
  - 'API Reference':
    - 'AI Client API': 'api/ai_client_api.md'
    - 'OpenAI Client Implementation': 'api/openai_client_impl.md'
    - 'AI Client Service': 'api/ai_client_service.md'
    - 'AI Client Adapter': 'api/ai_client_adapter.md'
  - 'Testing': 'testing.md'
  - 'CI/CD Setup': 'circleci-setup.md'

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences

plugins:
  - mkdocstrings:
      handlers:
        python:
          options:
            # This helps mkdocstrings find packages in the src directory
            search_paths: 
              - src/ai_client_api/src
              - src/openai_client_impl/src
              - src/ai_client_service/src
              - src/ai_client_adapter/src
            show_source: false
            docstring_section_style: spacy
            members_order: source
